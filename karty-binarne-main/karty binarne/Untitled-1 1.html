<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Karty Binarne</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f2f2f2;
}

h1{
    margin-top:20px;
}

#cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin:20px;
}

.card{
    width:120px;
    height:180px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.card.off{
    opacity:0.2;
    filter: grayscale(100%);
}

#sum{
    font-size:28px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>Karty Binarne</h1>

<div id="cards"></div>

<p>Suma: <span id="sum">0</span></p>

<script>

const values = [256,128,64,32,16,8,4,2,1];
const container = document.getElementById("cards");
let sum = 0;

values.forEach(value => {

    const img = document.createElement("img");
    img.src = value + ".png";
    img.dataset.value = value;
    img.classList.add("card","off");

    img.onclick = () => {

        if(img.classList.contains("off")){
            img.classList.remove("off");
            sum += value;
        }else{
            img.classList.add("off");
            sum -= value;
        }

        document.getElementById("sum").innerText = sum;
    };

    container.appendChild(img);
});

</script>

</body>
</html>
